<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Live Stream</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;touch-action:manipulation;-webkit-user-select:none;user-select:none;}

#stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000;z-index:1;}

#player-wrap{position:relative;width:100%;height:min(56.25vw,100vh);background:#000;}
#player-wrap.fs-desktop{width:100vw;height:100vh;}
#player-wrap.fs-rotate{
  position:fixed;top:50%;left:50%;
  width:100vh;height:100vw;
  transform:translate(-50%,-50%) rotate(90deg);
  transform-origin:center center;
  z-index:9000;transition:transform .25s ease;
}

#stream-frame{position:absolute;inset:0;width:100%;height:100%;border:none;display:block;}

/* ── 4K badge (Nepal) ── */
#wm{
  display:none;position:absolute;top:10px;right:10px;z-index:600;pointer-events:none;
  background:#d00;color:#fff;font-family:'Arial Black',Arial,sans-serif;
  font-weight:900;font-size:clamp(11px,2.2vw,18px);letter-spacing:2px;
  padding:3px 9px;border-radius:5px;
  box-shadow:0 2px 12px rgba(200,0,0,.7),0 0 0 1.5px rgba(255,80,80,.35);
  text-shadow:0 1px 4px rgba(0,0,0,.5);
  animation:wmPulse 3s ease-in-out infinite;
}
#wm::before{content:'';position:absolute;inset:-4px;border-radius:9px;border:1.5px solid rgba(255,80,80,.45);animation:wmRing 3s ease-in-out infinite;}
@keyframes wmPulse{0%,100%{box-shadow:0 2px 12px rgba(200,0,0,.7),0 0 0 1.5px rgba(255,80,80,.35)}50%{box-shadow:0 2px 20px rgba(220,0,0,.9),0 0 0 1.5px rgba(255,100,100,.55)}}
@keyframes wmRing{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.04)}}

/* ══════════════════════════
   VOLUME BAR — top of player
   India users only
══════════════════════════ */
#vol-bar{
  display:none; /* shown via JS for India */
  position:absolute;top:0;left:0;right:0;z-index:700;
  background:linear-gradient(180deg,rgba(0,0,0,.78) 0%,transparent 100%);
  padding:10px 14px 22px;
  align-items:center;gap:10px;
  opacity:1;transition:opacity .4s;
}
#vol-bar.auto-hide{opacity:0;pointer-events:none;}

.v-btn{
  width:34px;height:34px;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.2);
  border-radius:50%;color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:background .15s,transform .1s;
  touch-action:manipulation;-webkit-tap-highlight-color:transparent;
}
.v-btn:active{background:rgba(255,255,255,.28);transform:scale(.88);}
.v-btn svg{width:17px;height:17px;pointer-events:none;}

#vol-track{
  flex:1;height:5px;
  background:rgba(255,255,255,.18);
  border-radius:5px;position:relative;
  cursor:pointer;touch-action:none;
}
#vol-fill{
  height:100%;border-radius:5px;
  background:linear-gradient(90deg,#fff 0%,rgba(255,255,255,.82) 100%);
  width:80%;pointer-events:none;
  transition:width .07s;
}
/* knob */
#vol-track::after{
  content:'';position:absolute;top:50%;
  transform:translateY(-50%);
  left:calc(var(--vp,80%) - 7px);
  width:14px;height:14px;
  background:#fff;border-radius:50%;
  box-shadow:0 1px 6px rgba(0,0,0,.55);
  pointer-events:none;transition:left .07s;
}

#vol-pct{
  font-family:Arial,sans-serif;font-size:11px;font-weight:700;
  color:rgba(255,255,255,.65);min-width:32px;text-align:right;
  letter-spacing:.4px;flex-shrink:0;
}

/* ── Fullscreen btn ── */
#fs-btn{
  position:fixed;bottom:env(safe-area-inset-bottom,14px);right:14px;z-index:9500;
  width:42px;height:42px;
  background:rgba(0,0,0,.65);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.22);border-radius:10px;
  color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  touch-action:manipulation;-webkit-tap-highlight-color:transparent;
  transition:background .15s,transform .1s;
}
#fs-btn:active{background:rgba(255,255,255,.18);transform:scale(.94);}
#fs-btn svg{width:20px;height:20px;pointer-events:none;}

/* ── Phone-style volume HUD (left side) ── */
#vol-hud{
  display:none;
  position:fixed;top:50%;left:14px;transform:translateY(-50%);
  z-index:9800;
  background:rgba(14,14,22,.88);
  border:1px solid rgba(255,255,255,.13);
  border-radius:16px;padding:14px 10px;
  flex-direction:column;align-items:center;gap:8px;
  width:40px;opacity:0;transition:opacity .3s;pointer-events:none;
}
#vol-hud.show{display:flex;}
#vol-hud.visible{opacity:1;}
#vhud-icon svg{width:18px;height:18px;color:#fff;}
#vhud-track{width:4px;height:80px;background:rgba(255,255,255,.14);border-radius:4px;position:relative;overflow:hidden;}
#vhud-fill{position:absolute;bottom:0;left:0;right:0;background:#fff;border-radius:4px;height:80%;transition:height .09s;}
#vhud-pct{font-family:Arial,sans-serif;font-size:9px;font-weight:800;color:rgba(255,255,255,.55);letter-spacing:.3px;}

/* ── VPN overlay ── */
#vpn-ov{
  display:none;position:fixed;inset:0;z-index:99999;
  background:rgba(6,6,10,.98);
  flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:28px;font-family:Arial,sans-serif;color:#fff;
}
#vpn-ov.show{display:flex;}
.vpn-globe{font-size:54px;margin-bottom:18px;}
.vpn-title{font-size:clamp(24px,7vw,44px);font-weight:900;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:12px;}
.vpn-sub{font-size:clamp(13px,3.5vw,16px);color:rgba(255,255,255,.52);max-width:360px;line-height:1.75;margin-bottom:26px;}
.vpn-btn{display:inline-flex;align-items:center;gap:8px;background:#c00;color:#fff;font-weight:800;font-size:13px;letter-spacing:.5px;padding:13px 30px;border-radius:10px;text-decoration:none;border:none;cursor:pointer;transition:background .2s;}
.vpn-btn:hover{background:#e00;}
.vpn-note{margin-top:16px;font-size:10px;color:rgba(255,255,255,.22);letter-spacing:1.2px;text-transform:uppercase;}
</style>
</head>
<body>

<div id="stage">
  <div id="player-wrap">

    <iframe id="stream-frame"
      src="https://hlsplayers.pages.dev/player3?url=https://imgs-001.juno-api-noe.icu/secure/api/v1/lchd-fs501.m3u8"
      allow="autoplay; fullscreen; picture-in-picture; encrypted-media"
      allowfullscreen scrolling="no" frameborder="0"></iframe>

    <!-- Nepal badge -->
    <div id="wm">4K</div>

    <!-- Volume bar — top of player, India only -->
    <div id="vol-bar">

      <!-- Mute -->
      <button class="v-btn" id="btn-mute" aria-label="Mute toggle">
        <svg id="ic-unmuted" viewBox="0 0 24 24" fill="currentColor">
          <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0014 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
        </svg>
        <svg id="ic-muted" viewBox="0 0 24 24" fill="currentColor" style="display:none">
          <path d="M16.5 12A4.5 4.5 0 0014 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.796 8.796 0 0021 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06A8.99 8.99 0 0017.22 19l2 2L20.73 20 4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
        </svg>
      </button>

      <!-- Vol down -->
      <button class="v-btn" id="btn-dn" aria-label="Volume down">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.5 12A4.5 4.5 0 0016 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5z"/></svg>
      </button>

      <!-- Slider -->
      <div id="vol-track" role="slider" aria-label="Volume" aria-valuemin="0" aria-valuemax="100" aria-valuenow="80">
        <div id="vol-fill"></div>
      </div>

      <!-- Vol up -->
      <button class="v-btn" id="btn-up" aria-label="Volume up">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0014 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      </button>

      <div id="vol-pct">80%</div>
    </div>

  </div>
</div>

<!-- Fullscreen button -->
<button id="fs-btn" aria-label="Fullscreen">
  <svg id="ic-expand" viewBox="0 0 24 24" fill="currentColor"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
  <svg id="ic-exit"   viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
</button>

<!-- Phone HUD toast -->
<div id="vol-hud">
  <div id="vhud-icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0014 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></div>
  <div id="vhud-track"><div id="vhud-fill"></div></div>
  <div id="vhud-pct">80%</div>
</div>

<!-- VPN overlay -->
<div id="vpn-ov">
  <div class="vpn-globe">🌐</div>
  <div class="vpn-title">Region Blocked</div>
  <div class="vpn-sub">
    This stream is only available in <strong style="color:#fff">India &amp; Nepal</strong>.<br>
    Connect to an <strong style="color:#ff4444">Indian or Nepali VPN</strong> and refresh.
  </div>
  <a class="vpn-btn" href="javascript:location.reload()">↺ Retry with VPN</a>
  <div class="vpn-note">Connect India / Nepal VPN · Then Refresh</div>
</div>

<script>
/* ═══════ VOLUME ENGINE ═══════ */
var vol    = 0.80;
var muted  = false;
var frame  = document.getElementById('stream-frame');
var volBar = document.getElementById('vol-bar');
var isMobile = ('ontouchstart' in window)||(navigator.maxTouchPoints>0)||/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

function postVol(v){
  try{
    frame.contentWindow.postMessage({type:'setVolume',volume:v},'*');
    frame.contentWindow.postMessage({volume:v},'*');
    frame.contentWindow.postMessage(JSON.stringify({event:'command',func:'setVolume',args:[Math.round(v*100)]}),'*');
  }catch(e){}
}

function applyVol(){
  var effective = muted ? 0 : vol;
  postVol(effective);

  var pct = Math.round(effective * 100);
  var pctStr = pct + '%';

  /* bar */
  document.getElementById('vol-fill').style.width = pctStr;
  document.getElementById('vol-track').style.setProperty('--vp', pctStr);
  document.getElementById('vol-track').setAttribute('aria-valuenow', pct);
  document.getElementById('vol-pct').textContent = pctStr;

  /* icons */
  document.getElementById('ic-unmuted').style.display = (muted||vol===0) ? 'none'  : 'block';
  document.getElementById('ic-muted').style.display   = (muted||vol===0) ? 'block' : 'none';

  /* HUD */
  document.getElementById('vhud-fill').style.height = pctStr;
  document.getElementById('vhud-pct').textContent   = pctStr;

  showHUD();
}

/* mute btn */
document.getElementById('btn-mute').addEventListener('click',    muteToggle);
document.getElementById('btn-mute').addEventListener('touchend', function(e){ e.preventDefault(); muteToggle(); }, {passive:false});
function muteToggle(){ muted=!muted; applyVol(); }

/* +/- buttons */
document.getElementById('btn-up').addEventListener('click',    function(){ changeVol(+0.10); });
document.getElementById('btn-dn').addEventListener('click',    function(){ changeVol(-0.10); });
document.getElementById('btn-up').addEventListener('touchend', function(e){ e.preventDefault(); changeVol(+0.10); }, {passive:false});
document.getElementById('btn-dn').addEventListener('touchend', function(e){ e.preventDefault(); changeVol(-0.10); }, {passive:false});

function changeVol(delta){
  vol = Math.max(0, Math.min(1, vol + delta));
  if(vol > 0) muted = false;
  applyVol();
}

/* Slider drag — mouse */
var track    = document.getElementById('vol-track');
var dragging = false;

function volFromX(clientX){
  var rect = track.getBoundingClientRect();
  vol = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  if(vol > 0) muted = false;
  applyVol();
}

track.addEventListener('mousedown', function(e){ dragging=true; volFromX(e.clientX); e.preventDefault(); });
document.addEventListener('mousemove', function(e){ if(dragging) volFromX(e.clientX); });
document.addEventListener('mouseup',   function(){ dragging=false; });

/* Slider drag — touch */
track.addEventListener('touchstart', function(e){ dragging=true; volFromX(e.touches[0].clientX); }, {passive:true});
document.addEventListener('touchmove', function(e){ if(dragging) volFromX(e.touches[0].clientX); }, {passive:true});
document.addEventListener('touchend',  function(){ dragging=false; });

/* Desktop auto-hide vol bar */
var hideTimer = null;
function revealBar(){
  volBar.classList.remove('auto-hide');
  clearTimeout(hideTimer);
  if(!isMobile) hideTimer = setTimeout(function(){ volBar.classList.add('auto-hide'); }, 3500);
}
document.getElementById('player-wrap').addEventListener('mousemove', revealBar);
document.getElementById('player-wrap').addEventListener('touchstart', revealBar, {passive:true});
volBar.addEventListener('mouseenter', function(){ clearTimeout(hideTimer); });
volBar.addEventListener('mouseleave', function(){
  if(!isMobile) hideTimer = setTimeout(function(){ volBar.classList.add('auto-hide'); }, 1500);
});

/* Phone HUD toast */
var hud = document.getElementById('vol-hud');
var hudTimer = null;
function showHUD(){
  hud.classList.add('show');
  requestAnimationFrame(function(){ hud.classList.add('visible'); });
  clearTimeout(hudTimer);
  hudTimer = setTimeout(function(){
    hud.classList.remove('visible');
    setTimeout(function(){ hud.classList.remove('show'); }, 350);
  }, 1800);
}

/* ═══════ GEO CHECK ═══════ */
(function(){
  function tryGeo(url, parse){
    return fetch(url,{cache:'no-store'}).then(function(r){return r.json();}).then(parse).catch(function(){return null;});
  }
  Promise.all([
    tryGeo('https://ipapi.co/json/',  function(d){return d&&d.country_code?d.country_code:null;}),
    tryGeo('https://api.country.is/', function(d){return d&&d.country?d.country:null;})
  ]).then(function(res){
    var r1=res[0], r2=res[1];
    if(r1===null && r2===null) return; /* both APIs down → fail open */

    var isNP = (r1==='NP'||r2==='NP');
    var isIN = (r1==='IN'||r2==='IN');

    if(isNP){
      /* Nepal: 4K watermark, use player's own volume */
      document.getElementById('wm').style.display = 'block';
    } else if(isIN){
      /* India: show volume bar */
      volBar.style.display = 'flex';
      if(!isMobile) volBar.classList.add('auto-hide'); /* desktop: hide until hover */
      applyVol(); /* init UI values */
    } else {
      /* Everyone else: VPN block */
      document.getElementById('vpn-ov').classList.add('show');
    }
  }).catch(function(){});
})();

/* ═══════ FULLSCREEN ═══════ */
var isFS = false;
var wrap = document.getElementById('player-wrap');
var fsBtn = document.getElementById('fs-btn');

function enterFS(){
  isFS=true;
  document.getElementById('ic-expand').style.display='none';
  document.getElementById('ic-exit').style.display='block';
  if(isMobile){
    wrap.classList.add('fs-rotate');
  } else {
    wrap.classList.add('fs-desktop');
    var st=document.getElementById('stage');
    if(st.requestFullscreen)            st.requestFullscreen();
    else if(st.webkitRequestFullscreen) st.webkitRequestFullscreen();
  }
}
function exitFS(){
  isFS=false;
  document.getElementById('ic-expand').style.display='block';
  document.getElementById('ic-exit').style.display='none';
  if(isMobile){
    wrap.classList.remove('fs-rotate');
  } else {
    wrap.classList.remove('fs-desktop');
    if(document.fullscreenElement||document.webkitFullscreenElement){
      (document.exitFullscreen||document.webkitExitFullscreen).call(document);
    }
  }
}

fsBtn.addEventListener('click',    function(e){ e.preventDefault(); isFS?exitFS():enterFS(); });
fsBtn.addEventListener('touchend', function(e){ e.preventDefault(); isFS?exitFS():enterFS(); },{passive:false});

document.addEventListener('fullscreenchange',       syncFS);
document.addEventListener('webkitfullscreenchange', syncFS);
function syncFS(){
  if(!(document.fullscreenElement||document.webkitFullscreenElement)&&isFS&&!isMobile){
    isFS=false;wrap.classList.remove('fs-desktop');
    document.getElementById('ic-expand').style.display='block';
    document.getElementById('ic-exit').style.display='none';
  }
}

document.addEventListener('touchstart',function(e){
  if(isFS&&isMobile&&!wrap.contains(e.target)&&!fsBtn.contains(e.target)) exitFS();
},{passive:true});
</script>
</body>
</html>
