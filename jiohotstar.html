<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>STREAM by RISHI</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --glass-bg:rgba(255,255,255,0.06);
    --glass-border:rgba(255,255,255,0.12);
    --glass-hover:rgba(255,255,255,0.11);
    --accent:#00e5ff;
    --accent2:#ff4081;
    --surface:rgba(10,14,26,0.85);
    --text:#f0f4ff;
    --muted:rgba(200,210,240,0.55);
  }
  html,body{
    height:100%;
    background:#06080f;
    color:var(--text);
    font-family:'Outfit',sans-serif;
    overflow-x:hidden;
    /* Safe area for notch/home-bar devices */
    padding-left:env(safe-area-inset-left);
    padding-right:env(safe-area-inset-right);
  }

  /* BG GLOW */
  body::before{
    content:'';position:fixed;inset:0;
    background:
      radial-gradient(ellipse 70% 55% at 20% 10%,rgba(0,229,255,0.07) 0%,transparent 60%),
      radial-gradient(ellipse 50% 60% at 85% 80%,rgba(255,64,129,0.06) 0%,transparent 60%),
      radial-gradient(ellipse 80% 80% at 50% 50%,rgba(20,30,60,0.9) 0%,transparent 100%);
    pointer-events:none;z-index:0;
  }

  /* NOISE OVERLAY */
  body::after{
    content:'';position:fixed;inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events:none;z-index:0;opacity:0.6;
  }

  .wrapper{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}

  /* ── HEADER ── */
  header{
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 28px 14px;
    border-bottom:1px solid var(--glass-border);
    background:rgba(6,8,15,0.7);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    position:sticky;top:0;z-index:100;
    /* respect notch */
    padding-left:max(28px, env(safe-area-inset-left));
    padding-right:max(28px, env(safe-area-inset-right));
  }
  .logo{
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(22px, 5vw, 28px);
    letter-spacing:3px;
    background:linear-gradient(135deg,var(--accent) 0%,#a0f0ff 50%,var(--text) 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;
    line-height:1.1;
  }
  .logo span{
    color:var(--accent2);-webkit-text-fill-color:var(--accent2);
    font-size:clamp(10px, 2.5vw, 14px);
    letter-spacing:4px;display:block;margin-top:-4px;
    font-family:'Outfit',sans-serif;font-weight:300;
  }
  .live-badge{
    display:flex;align-items:center;gap:7px;
    background:rgba(255,64,129,0.15);border:1px solid rgba(255,64,129,0.35);
    padding:5px 14px;border-radius:20px;
    font-size:12px;font-weight:600;letter-spacing:1.5px;color:#ff6b9d;
    flex-shrink:0;
  }
  .live-dot{
    width:7px;height:7px;border-radius:50%;
    background:#ff4081;animation:pulse 1.4s ease-in-out infinite;
    flex-shrink:0;
  }
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.8)}}

  /* ── MAIN ── */
  main{
    flex:1;display:flex;flex-direction:column;
    padding:16px 16px 24px;
    gap:16px;
    max-width:1280px;width:100%;margin:0 auto;
    padding-bottom:max(24px, env(safe-area-inset-bottom));
  }

  /* ── PLAYER ── */
  .player-wrap{
    position:relative;width:100%;
    aspect-ratio:16/9;
    border-radius:14px;overflow:hidden;
    border:1px solid var(--glass-border);
    background:#000;
    box-shadow:0 0 60px rgba(0,229,255,0.08),0 0 0 1px rgba(255,255,255,0.04);
  }
  .player-wrap iframe{
    width:100%;height:100%;border:none;display:block;
  }
  .player-label{
    position:absolute;top:10px;left:10px;
    background:rgba(0,0,0,0.65);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border:1px solid var(--glass-border);
    padding:4px 12px;border-radius:20px;
    font-size:11px;font-weight:500;letter-spacing:1px;color:var(--accent);
    pointer-events:none;
  }

  /* ── CHANNEL GROUPS ── */
  .channels-area{display:flex;flex-direction:column;gap:12px}
  .group-label{
    font-size:10px;font-weight:600;letter-spacing:2.5px;color:var(--muted);
    text-transform:uppercase;padding-left:2px;
  }

  /* Grid: 2 columns on mobile, auto-fit on larger screens */
  .channels-row{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:10px;
  }

  .ch-btn{
    display:flex;align-items:center;gap:10px;
    padding:12px 14px;
    border-radius:12px;
    border:1px solid var(--glass-border);
    background:var(--glass-bg);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    cursor:pointer;
    transition:all 0.2s ease;
    color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;
    position:relative;overflow:hidden;
    user-select:none;
    width:100%;
    /* Minimum comfortable tap target */
    min-height:56px;
    text-align:left;
  }
  .ch-btn::before{
    content:'';position:absolute;inset:0;
    background:linear-gradient(135deg,rgba(255,255,255,0.07) 0%,transparent 70%);
    pointer-events:none;
  }
  .ch-btn:active{
    transform:scale(0.97);
    background:var(--glass-hover);
  }
  @media(hover:hover){
    .ch-btn:hover{
      background:var(--glass-hover);
      border-color:rgba(0,229,255,0.3);
      transform:translateY(-2px);
      box-shadow:0 8px 24px rgba(0,0,0,0.3),0 0 20px rgba(0,229,255,0.07);
    }
  }
  .ch-btn.active{
    background:rgba(0,229,255,0.1);
    border-color:rgba(0,229,255,0.5);
    box-shadow:0 0 28px rgba(0,229,255,0.15),0 8px 24px rgba(0,0,0,0.3);
    color:var(--accent);
  }

  .ch-icon{
    width:34px;height:34px;border-radius:8px;
    display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:700;flex-shrink:0;
    font-family:'Bebas Neue',sans-serif;letter-spacing:0.5px;
  }
  .icon-fox{background:linear-gradient(135deg,#c8102e,#8b0000);color:#fff}
  .icon-sky{background:linear-gradient(135deg,#0052cc,#003d99);color:#fff}
  .icon-star{background:linear-gradient(135deg,#e8a000,#b87800);color:#fff}
  .icon-wil{background:linear-gradient(135deg,#1a7a3c,#0e5228);color:#fff}
  .icon-starh{background:linear-gradient(135deg,#cc2200,#991a00);color:#fff}

  .ch-info{display:flex;flex-direction:column;gap:2px;min-width:0}
  .ch-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ch-lang{font-size:10px;color:var(--muted);font-weight:400;letter-spacing:0.5px}

  /* ── FOOTER ── */
  footer{
    text-align:center;padding:14px 16px;
    padding-bottom:max(14px, env(safe-area-inset-bottom));
    font-size:11px;color:rgba(200,210,240,0.25);
    letter-spacing:1px;border-top:1px solid var(--glass-border);
    background:rgba(6,8,15,0.6);
  }

  /* ── TABLET / DESKTOP ── */
  @media(min-width:480px){
    main{padding:20px 20px 28px;gap:18px}
    .channels-row{
      grid-template-columns:repeat(auto-fill, minmax(170px, 1fr));
    }
    header{padding:18px 28px 14px}
  }
  @media(min-width:768px){
    .ch-btn{padding:12px 18px}
    .ch-icon{width:36px;height:36px;font-size:14px}
    .ch-name{font-size:14px}
    .player-wrap{border-radius:16px}
  }
  @media(min-width:1024px){
    main{padding:24px 28px 32px;gap:22px}
    .channels-row{
      grid-template-columns:repeat(auto-fill, minmax(190px, 1fr));
    }
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="logo">
      STREAM by RISHI
      <span>LIVE SPORTS &nbsp;•&nbsp; HD</span>
    </div>
    <div class="live-badge">
      <div class="live-dot"></div>
      LIVE
    </div>
  </header>

  <main>

    <!-- PLAYER -->
    <div class="player-wrap">
      <iframe id="player"
        src="https://www.foulembeds.live/embed/fox-sports-501"
        allowfullscreen
        allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
        scrolling="no"
        referrerpolicy="no-referrer-when-downgrade">
      </iframe>
      <div class="player-label" id="now-label">FOX SPORTS</div>
    </div>

    <!-- CHANNEL BUTTONS -->
    <div class="channels-area">

      <!-- ENGLISH -->
      <div class="group-label">English Feeds</div>
      <div class="channels-row">
        <button class="ch-btn active" onclick="switchCh(this,'https://www.foulembeds.live/embed/fox-sports-501','FOX SPORTS')">
          <div class="ch-icon icon-fox">FOX</div>
          <div class="ch-info"><span class="ch-name">Fox Sports</span><span class="ch-lang">English</span></div>
        </button>
        <button class="ch-btn" onclick="switchCh(this,'https://www.foulembeds.live/embed/sky-sport-4-nz','SKY SPORTS')">
          <div class="ch-icon icon-sky">SKY</div>
          <div class="ch-info"><span class="ch-name">Sky Sports</span><span class="ch-lang">English</span></div>
        </button>
        <button class="ch-btn" onclick="switchCh(this,'https://www.foulembeds.live/embed/star-sport-1','STAR SPORTS')">
          <div class="ch-icon icon-star">SS1</div>
          <div class="ch-info"><span class="ch-name">Star Sports</span><span class="ch-lang">English</span></div>
        </button>
      </div>

      <!-- HINDI -->
      <div class="group-label" style="margin-top:4px">Hindi Feeds</div>
      <div class="channels-row">
        <button class="ch-btn" onclick="switchCh(this,'https://www.foulembeds.live/embed/willow-cricket-2','WILLOW CRICKET')">
          <div class="ch-icon icon-wil">WIL</div>
          <div class="ch-info"><span class="ch-name">Willow Cricket</span><span class="ch-lang">Hindi</span></div>
        </button>
        <button class="ch-btn" onclick="switchCh(this,'https://www.foulembeds.live/embed/star-sport-1-hindi','STAR SPORTS HINDI')">
          <div class="ch-icon icon-starh">SSH</div>
          <div class="ch-info"><span class="ch-name">Star Sports</span><span class="ch-lang">Hindi</span></div>
        </button>
      </div>

    </div>
  </main>

  <footer>STREAM BY RISHI &nbsp;•&nbsp; ALL STREAMS IN HD</footer>

</div>

<script>
  function switchCh(btn, url, label) {
    document.querySelectorAll('.ch-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('player').src = url;
    document.getElementById('now-label').textContent = label;
  }
</script>
</body>
</html>
